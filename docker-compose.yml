services:
  db:
    image: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${PROD_DB_PASSWORD}
      MYSQL_DATABASE: pcgear
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - 3307:3306
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${PROD_DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s # <--- DB가 초기화될 시간을 줍니다. 이 시간 동안은 실패해도 재시도 횟수에 포함되지 않습니다.
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: ./BackEnd/pcgear
    ports:
      - "8080:8080" 
    env_file:
      - .env
    environment:
      - TZ=Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: 
      context: ./FrontEnd
      args:
        VITE_PORTONE_STORE_ID: ${VITE_PORTONE_STORE_ID}
        VITE_PORTONE_TOSSPAY_CHANNEL_KEY: ${VITE_PORTONE_TOSSPAY_CHANNEL_KEY}
    ports:
      - "3000:3000"
    depends_on:
      - backend
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: on-failure

  prometheus:
    image: prom/prometheus:latest
    container_name: pcgear-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./BackEnd/pcgear/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./BackEnd/pcgear/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    depends_on:
      - backend
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: pcgear-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./BackEnd/pcgear/monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped


volumes:
  mysql-data: {}
  redis-data: {}
  prometheus-data: {}
  grafana-data: {}