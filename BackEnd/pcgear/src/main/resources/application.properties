#application.properties

spring.application.name=pcgear

#Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.starttls.enable=true

# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.properties.hibernate.jdbc.order_updates=true




# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cache.type=redis 

spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true


# Admin Configuration
admin.email=jack981109@gmail.com

# Actuator - Cache Metrics (히트율 측정) + Prometheus
management.endpoints.web.exposure.include=health,metrics,caches,prometheus,info
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.enable.cache=true
management.metrics.enable.jvm=true
management.metrics.enable.system=true
management.metrics.enable.process=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.prometheus.metrics.export.enabled=true

# 애플리케이션 정보 (Grafana에서 표시용)
management.info.env.enabled=true
info.app.name=PCGear E-Commerce System
info.app.description=PC Parts E-Commerce Platform
info.app.version=1.0.0
