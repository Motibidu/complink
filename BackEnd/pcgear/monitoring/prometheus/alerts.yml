groups:
  - name: pcgear_alerts
    interval: 30s
    rules:
      # 애플리케이션 다운 알림
      - alert: ApplicationDown
        expr: up{job="pcgear-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PCGear Application is down"
          description: "PCGear application has been down for more than 1 minute."

      # 높은 에러율
      - alert: HighErrorRate
        expr: rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 2 minutes."

      # 메모리 사용량 높음
      - alert: HighMemoryUsage
        expr: (jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"}) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage detected"
          description: "Heap memory usage is above 90% for the last 5 minutes."

      # CPU 사용량 높음
      - alert: HighCpuUsage
        expr: system_cpu_usage > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is above 80% for the last 5 minutes."

      # 응답 시간 지연
      - alert: SlowResponseTime
        expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow API response time"
          description: "95th percentile response time is above 1 second."

      # 데이터베이스 연결 실패
      - alert: DatabaseConnectionFailure
        expr: hikaricp_connections_active == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool empty"
          description: "No active database connections available."

      # 재고 부족 알림
      - alert: FrequentStockOut
        expr: rate(business_stock_out_total[10m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Frequent stock out events"
          description: "Stock out events are occurring more than 5 times per 10 minutes."

      # 결제 실패율 높음
      - alert: HighPaymentFailureRate
        expr: |
          (
            rate(business_payment_failed_total[10m]) /
            (rate(business_payment_success_total[10m]) + rate(business_payment_failed_total[10m]))
          ) > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High payment failure rate"
          description: "Payment failure rate is above 10%."

      # 보상 트랜잭션 재시도 급증
      - alert: CompensationRetrySpike
        expr: rate(business_compensation_retry_total[5m]) > 10
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High compensation retry rate"
          description: "Compensation retry rate is above 10 per 5 minutes."
